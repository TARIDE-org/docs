<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1B3A4B" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#5A7A8A"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#1B3A4B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B3A4B" letter-spacing="0.5">TARIDE protocol architecture</text>

  <!-- On-chain zone -->
  <rect x="40" y="60" width="395" height="480" rx="6" fill="none" stroke="#C8D6DC" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="237" y="82" text-anchor="middle" font-size="11" fill="#8AA0AC" letter-spacing="1">ON-CHAIN</text>

  <!-- Off-chain zone -->
  <rect x="465" y="60" width="395" height="480" rx="6" fill="none" stroke="#C8D6DC" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="662" y="82" text-anchor="middle" font-size="11" fill="#8AA0AC" letter-spacing="1">OFF-CHAIN</text>

  <!-- LAYER 1: Verification layer -->
  <rect x="70" y="100" width="335" height="100" rx="4" fill="#1B3A4B" filter="url(#shadow)"/>
  <text x="237" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Verification layer</text>
  <text x="237" y="150" text-anchor="middle" font-size="11" fill="#A8C4D0">Self-sovereign DID  ·  owned by holder</text>
  <text x="237" y="168" text-anchor="middle" font-size="11" fill="#A8C4D0">Created via app or EU Digital Identity Wallet</text>
  <text x="237" y="186" text-anchor="middle" font-size="11" fill="#A8C4D0">Post-quantum agile  ·  W3C  ·  eIDAS 2.0</text>

  <!-- LAYER 2: Credential layer -->
  <rect x="70" y="225" width="335" height="100" rx="4" fill="#24495C" filter="url(#shadow)"/>
  <text x="237" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Credential layer</text>
  <text x="237" y="275" text-anchor="middle" font-size="11" fill="#A8C4D0">Mandatory: provider confirms contact point</text>
  <text x="237" y="293" text-anchor="middle" font-size="11" fill="#A8C4D0">Provider is witness, not owner of DID</text>
  <text x="237" y="311" text-anchor="middle" font-size="11" fill="#A8C4D0">Optional: KvK, regulators, certifications</text>

  <!-- LAYER 3: Reputation layer -->
  <rect x="70" y="350" width="335" height="100" rx="4" fill="#2E5A6E" filter="url(#shadow)"/>
  <text x="237" y="380" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Reputation layer</text>
  <text x="237" y="400" text-anchor="middle" font-size="11" fill="#A8C4D0">Only DIDs that opt into visibility</text>
  <text x="237" y="418" text-anchor="middle" font-size="11" fill="#A8C4D0">Weighted scoring  ·  manipulation-resistant</text>
  <text x="237" y="436" text-anchor="middle" font-size="11" fill="#A8C4D0">No individual profiles or personal ratings</text>

  <!-- Arrows between on-chain layers -->
  <line x1="237" y1="200" x2="237" y2="225" stroke="#5A7A8A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="237" y1="325" x2="237" y2="350" stroke="#5A7A8A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RESOLVER -->
  <rect x="495" y="175" width="335" height="160" rx="4" fill="#FFFFFF" stroke="#1B3A4B" stroke-width="2" filter="url(#shadow)"/>
  <text x="662" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B3A4B">Resolver network</text>
  <line x1="545" y1="220" x2="780" y2="220" stroke="#E0E8EC" stroke-width="1"/>
  <text x="662" y="242" text-anchor="middle" font-size="11" fill="#5A7A8A">Phone number ↔ DID associations</text>
  <text x="662" y="260" text-anchor="middle" font-size="11" fill="#5A7A8A">Cached credentials + reputation data</text>
  <text x="662" y="278" text-anchor="middle" font-size="11" fill="#5A7A8A">Sub-500ms real-time lookup API</text>
  <text x="662" y="296" text-anchor="middle" font-size="11" fill="#5A7A8A">Distributed DNS-like architecture</text>
  <text x="662" y="318" text-anchor="middle" font-size="10" fill="#8AA0AC">Integrity verified via on-chain commitments</text>

  <!-- Horizontal arrows: on-chain to resolver -->
  <line x1="405" y1="150" x2="495" y2="220" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <line x1="405" y1="275" x2="495" y2="260" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <line x1="405" y1="400" x2="495" y2="300" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- APPLICATIONS -->
  <rect x="495" y="390" width="155" height="70" rx="4" fill="#E8F0F4" stroke="#1B3A4B" stroke-width="1.5"/>
  <text x="572" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B3A4B">Calmido app</text>
  <text x="572" y="438" text-anchor="middle" font-size="10" fill="#5A7A8A">Reference implementation</text>

  <rect x="675" y="390" width="155" height="70" rx="4" fill="#E8F0F4" stroke="#5A7A8A" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="752" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B3A4B">Third-party apps</text>
  <text x="752" y="438" text-anchor="middle" font-size="10" fill="#5A7A8A">Open API access</text>

  <!-- Arrow resolver to applications -->
  <line x1="572" y1="335" x2="572" y2="390" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <line x1="700" y1="335" x2="752" y2="390" stroke="#5A7A8A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Trust anchors (issuers) -->
  <rect x="495" y="490" width="335" height="42" rx="4" fill="#F4F7F9" stroke="#C8D6DC" stroke-width="1"/>
  <text x="662" y="516" text-anchor="middle" font-size="11" fill="#5A7A8A">Providers as witnesses: telecom  ·  email  ·  messaging  |  Optional: KvK  ·  regulators</text>

  <!-- Arrow trust anchors to credential layer -->
  <path d="M 495 511 L 440 511 Q 430 511 430 501 L 430 310 Q 430 300 420 295 L 405 287" stroke="#5A7A8A" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 2"/>
  <text x="445" y="425" font-size="9" fill="#8AA0AC" transform="rotate(-90, 445, 425)">issue + revoke credentials</text>

  <!-- End users feedback -->
  <rect x="70" y="490" width="335" height="42" rx="4" fill="#F4F7F9" stroke="#C8D6DC" stroke-width="1"/>
  <text x="237" y="516" text-anchor="middle" font-size="11" fill="#5A7A8A">End users: anonymous feedback on registered organisations via connected applications</text>

  <!-- Arrow end users to reputation -->
  <line x1="237" y1="490" x2="237" y2="450" stroke="#5A7A8A" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 2"/>

  <!-- Legend -->
  <rect x="70" y="560" width="16" height="10" rx="2" fill="#1B3A4B"/>
  <text x="92" y="569" font-size="10" fill="#5A7A8A">On-chain protocol layers</text>

  <rect x="270" y="560" width="16" height="10" rx="2" fill="#FFFFFF" stroke="#1B3A4B" stroke-width="1.5"/>
  <text x="292" y="569" font-size="10" fill="#5A7A8A">Off-chain infrastructure</text>

  <line x1="480" y1="565" x2="510" y2="565" stroke="#5A7A8A" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="516" y="569" font-size="10" fill="#5A7A8A">Data flow</text>

  <line x1="620" y1="565" x2="650" y2="565" stroke="#1B3A4B" stroke-width="1.5"/>
  <text x="656" y="569" font-size="10" fill="#5A7A8A">Synchronisation</text>
</svg>
