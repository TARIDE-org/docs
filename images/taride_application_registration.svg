<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Application registers -->
<rect x="40" y="30" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="140" y="50" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Application</text>
<text x="140" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">Calmido, third-party app</text>

<!-- Foundation -->
<rect x="340" y="30" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="440" y="50" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">TARIDE Foundation</text>
<text x="440" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">Registers, audits, enforces</text>

<!-- Arrow: app registers with foundation -->
<line x1="240" y1="58" x2="336" y2="58" stroke="#D85A30" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="288" y="48" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888780">registers with</text>

<!-- UUID -->
<rect x="200" y="120" width="280" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="140" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Application UUID issued</text>
<line x1="440" y1="86" x2="400" y2="116" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="432" y="104" text-anchor="start" font-family="sans-serif" font-size="12" fill="#888780">issues</text>

<!-- Separator -->
<line x1="40" y1="190" x2="640" y2="190" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.4"/>
<text x="340" y="208" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888780">UUID enables</text>

<!-- Five capabilities -->
<rect x="40" y="225" width="180" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="130" y="241" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Per-app consent</text>
<text x="130" y="259" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Users set rules per app</text>

<rect x="250" y="225" width="180" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="241" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Reputation attribution</text>
<text x="340" y="259" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Trace data to source app</text>

<rect x="460" y="225" width="180" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="550" y="241" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Revenue sharing</text>
<text x="550" y="259" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Lookup fees to contributors</text>

<rect x="100" y="295" width="180" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="190" y="311" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Rate limiting</text>
<text x="190" y="329" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Abuse prevention per app</text>

<rect x="400" y="295" width="180" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="490" y="311" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Enforcement</text>
<text x="490" y="329" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Revoke UUID on violation</text>

<!-- Separator -->
<line x1="40" y1="370" x2="640" y2="370" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.4"/>
<text x="340" y="388" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888780">Participation tiers</text>

<!-- Two tiers -->
<rect x="60" y="405" width="250" height="48" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="185" y="421" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Read-only</text>
<text x="185" y="439" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">Query trust profiles, pay lookup fees</text>

<rect x="370" y="405" width="250" height="48" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="495" y="421" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Contributing</text>
<text x="495" y="439" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">Submit reputation, earn revenue share</text>

<line x1="310" y1="429" x2="366" y2="429" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="338" y="420" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888780">upgrade</text>

</svg>