<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1B3A4B" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowR" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#1B3A4B"/>
    </marker>
    <marker id="arrowD" viewBox="0 0 7 10" refX="3.5" refY="10" markerWidth="7" markerHeight="10" orient="auto">
      <path d="M 0 0 L 3.5 10 L 7 0 z" fill="#1B3A4B"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#FAFBFC"/>

  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B3A4B" letter-spacing="0.5">Use case: a new Calmido user</text>

  <!-- Step 1 -->
  <rect x="30" y="65" width="250" height="90" rx="4" fill="#1B3A4B" filter="url(#shadow)"/>
  <text x="155" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">1. DID creation</text>
  <line x1="55" y1="100" x2="230" y2="100" stroke="#2E5A6E" stroke-width="1"/>
  <text x="155" y="118" text-anchor="middle" font-size="10" fill="#A8C4D0">App generates key pair</text>
  <text x="155" y="134" text-anchor="middle" font-size="10" fill="#A8C4D0">Public key → on-chain (DID)</text>
  <text x="155" y="148" text-anchor="middle" font-size="10" fill="#A8C4D0">Private key → device only</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="110" x2="320" y2="110" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Step 2 -->
  <rect x="320" y="65" width="250" height="90" rx="4" fill="#24495C" filter="url(#shadow)"/>
  <text x="445" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">2. Link phone number</text>
  <line x1="345" y1="100" x2="545" y2="100" stroke="#2E5A6E" stroke-width="1"/>
  <text x="445" y="118" text-anchor="middle" font-size="10" fill="#A8C4D0">Instance ↔ DID stored in resolver</text>
  <text x="445" y="134" text-anchor="middle" font-size="10" fill="#A8C4D0">Cryptographic commitment</text>
  <text x="445" y="148" text-anchor="middle" font-size="10" fill="#A8C4D0">on-chain (number stays private)</text>

  <!-- Arrow 2→3 -->
  <line x1="570" y1="110" x2="610" y2="110" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Step 3 -->
  <rect x="610" y="65" width="260" height="90" rx="4" fill="#2E5A6E" filter="url(#shadow)"/>
  <text x="740" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">3. Provider verification</text>
  <line x1="635" y1="100" x2="845" y2="100" stroke="#3A6A7E" stroke-width="1"/>
  <text x="740" y="118" text-anchor="middle" font-size="10" fill="#A8C4D0">Telecom confirms: number is</text>
  <text x="740" y="134" text-anchor="middle" font-size="10" fill="#A8C4D0">registered and active</text>
  <text x="740" y="148" text-anchor="middle" font-size="10" fill="#A8C4D0">Credential issued → on-chain</text>

  <!-- Arrow 3→4 (down and left) -->
  <path d="M 740 155 L 740 190 L 155 190 L 155 215" fill="none" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowD)"/>

  <!-- Step 4 -->
  <rect x="30" y="215" width="250" height="110" rx="4" fill="#1B3A4B" filter="url(#shadow)"/>
  <text x="155" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">4. Receiving a call</text>
  <line x1="55" y1="250" x2="255" y2="250" stroke="#2E5A6E" stroke-width="1"/>
  <text x="155" y="268" text-anchor="middle" font-size="10" fill="#A8C4D0">App queries resolver in real time</text>
  <text x="155" y="284" text-anchor="middle" font-size="10" fill="#A8C4D0">Returns: DID + credential status</text>
  <text x="155" y="300" text-anchor="middle" font-size="10" fill="#A8C4D0">+ identity (if disclosed)</text>
  <text x="155" y="316" text-anchor="middle" font-size="10" fill="#A8C4D0">+ reputation score</text>

  <!-- Arrow 4→5 -->
  <line x1="280" y1="270" x2="320" y2="270" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Step 5 -->
  <rect x="320" y="215" width="250" height="110" rx="4" fill="#24495C" filter="url(#shadow)"/>
  <text x="445" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">5. User feedback</text>
  <line x1="345" y1="250" x2="545" y2="250" stroke="#2E5A6E" stroke-width="1"/>
  <text x="445" y="268" text-anchor="middle" font-size="10" fill="#A8C4D0">User taps: trusted / spam / fraud</text>
  <text x="445" y="284" text-anchor="middle" font-size="10" fill="#A8C4D0">Stored in Calmido database</text>
  <text x="445" y="300" text-anchor="middle" font-size="10" fill="#A8C4D0">Periodically aggregated</text>
  <text x="445" y="316" text-anchor="middle" font-size="10" fill="#A8C4D0">and written to on-chain contract</text>

  <!-- Arrow 5→6 -->
  <line x1="570" y1="270" x2="610" y2="270" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Step 6 -->
  <rect x="610" y="215" width="260" height="110" rx="4" fill="#2E5A6E" filter="url(#shadow)"/>
  <text x="740" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">6. Cross-app access</text>
  <line x1="635" y1="250" x2="845" y2="250" stroke="#3A6A7E" stroke-width="1"/>
  <text x="740" y="268" text-anchor="middle" font-size="10" fill="#A8C4D0">Any app queries same resolver</text>
  <text x="740" y="284" text-anchor="middle" font-size="10" fill="#A8C4D0">Gets same DID + credentials</text>
  <text x="740" y="300" text-anchor="middle" font-size="10" fill="#A8C4D0">+ aggregated score from all apps</text>
  <text x="740" y="316" text-anchor="middle" font-size="10" fill="#A8C4D0">Raw UGC stays with originator</text>

  <!-- Data location legend -->
  <rect x="30" y="370" width="840" height="140" rx="4" fill="#F4F7F9" stroke="#C8D6DC" stroke-width="1"/>
  <text x="450" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B3A4B">Where data lives</text>
  <line x1="60" y1="405" x2="840" y2="405" stroke="#E0E8EC" stroke-width="1"/>

  <!-- On-chain -->
  <rect x="60" y="420" width="16" height="12" rx="2" fill="#1B3A4B"/>
  <text x="84" y="431" font-size="11" font-weight="bold" fill="#1B3A4B">On-chain</text>
  <text x="60" y="450" font-size="10" fill="#5A7A8A">DID public keys  ·  credential records  ·  cryptographic commitments  ·  aggregated reputation scores</text>

  <!-- Resolver -->
  <rect x="60" y="468" width="16" height="12" rx="2" fill="#24495C"/>
  <text x="84" y="479" font-size="11" font-weight="bold" fill="#1B3A4B">Resolver (off-chain)</text>
  <text x="60" y="498" font-size="10" fill="#5A7A8A">Instance ↔ DID associations  ·  cached credentials and reputation  ·  real-time lookup API</text>

  <!-- App -->
  <rect x="500" y="420" width="16" height="12" rx="2" fill="#2E5A6E"/>
  <text x="524" y="431" font-size="11" font-weight="bold" fill="#1B3A4B">Application (Calmido)</text>
  <text x="500" y="450" font-size="10" fill="#5A7A8A">Individual user feedback  ·  private key storage  ·  UX layer</text>

  <!-- Device -->
  <rect x="500" y="468" width="16" height="12" rx="2" fill="#5A7A8A"/>
  <text x="524" y="479" font-size="11" font-weight="bold" fill="#1B3A4B">User device</text>
  <text x="500" y="498" font-size="10" fill="#5A7A8A">Private key in secure enclave  ·  never leaves the device</text>
</svg>
