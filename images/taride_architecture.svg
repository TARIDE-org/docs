<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1B3A4B" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#5A7A8A"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#1B3A4B"/>
    </marker>
  </defs>

  <rect width="900" height="680" fill="#FAFBFC"/>
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B3A4B" letter-spacing="0.5">TARIDE protocol architecture</text>

  <!-- On-chain zone -->
  <rect x="40" y="60" width="395" height="500" rx="6" fill="none" stroke="#C8D6DC" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="237" y="82" text-anchor="middle" font-size="11" fill="#8AA0AC" letter-spacing="1">ON-CHAIN</text>

  <!-- Off-chain zone -->
  <rect x="465" y="60" width="395" height="500" rx="6" fill="none" stroke="#C8D6DC" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="662" y="82" text-anchor="middle" font-size="11" fill="#8AA0AC" letter-spacing="1">OFF-CHAIN</text>

  <!-- LAYER 1: Registration layer -->
  <rect x="70" y="95" width="335" height="80" rx="4" fill="#1B3A4B" filter="url(#shadow)"/>
  <text x="237" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Registration layer</text>
  <text x="237" y="138" text-anchor="middle" font-size="10" fill="#A8C4D0">Self-sovereign DID · owned by holder</text>
  <text x="237" y="154" text-anchor="middle" font-size="10" fill="#A8C4D0">Created via app or EU Digital Identity Wallet</text>

  <!-- LAYER 2: Verification layer -->
  <rect x="70" y="195" width="335" height="80" rx="4" fill="#24495C" filter="url(#shadow)"/>
  <text x="237" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Verification layer</text>
  <text x="237" y="238" text-anchor="middle" font-size="10" fill="#A8C4D0">Mandatory: resolver confirms instance ownership</text>
  <text x="237" y="254" text-anchor="middle" font-size="10" fill="#A8C4D0">Optional: KvK · regulators · certifications</text>

  <!-- LAYER 3: Reputation layer -->
  <rect x="70" y="295" width="335" height="80" rx="4" fill="#2E5A6E" filter="url(#shadow)"/>
  <text x="237" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Reputation layer</text>
  <text x="237" y="338" text-anchor="middle" font-size="10" fill="#A8C4D0">Opted-in DIDs only · weighted scoring</text>
  <text x="237" y="354" text-anchor="middle" font-size="10" fill="#A8C4D0">Bound to DID + instance, not resolver</text>

  <!-- LAYER 4: Consent layer -->
  <rect x="70" y="395" width="335" height="80" rx="4" fill="#3A6B7E" filter="url(#shadow)"/>
  <text x="237" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Consent layer</text>
  <text x="237" y="438" text-anchor="middle" font-size="10" fill="#A8C4D0">Open · verified · established · trusted · contacts only</text>
  <text x="237" y="454" text-anchor="middle" font-size="10" fill="#A8C4D0">Per channel · recipient controls reachability</text>

  <!-- Arrows between on-chain layers -->
  <line x1="237" y1="175" x2="237" y2="195" stroke="#5A7A8A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="237" y1="275" x2="237" y2="295" stroke="#5A7A8A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="237" y1="375" x2="237" y2="395" stroke="#5A7A8A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RESOLVER -->
  <rect x="495" y="140" width="335" height="200" rx="4" fill="#FFFFFF" stroke="#1B3A4B" stroke-width="2" filter="url(#shadow)"/>
  <text x="662" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B3A4B">Resolver network</text>
  <line x1="545" y1="178" x2="780" y2="178" stroke="#E0E8EC" stroke-width="1"/>
  <text x="662" y="198" text-anchor="middle" font-size="10" fill="#5A7A8A">Instance ↔ DID associations</text>
  <text x="662" y="216" text-anchor="middle" font-size="10" fill="#5A7A8A">Cached credentials + reputation data</text>
  <text x="662" y="234" text-anchor="middle" font-size="10" fill="#5A7A8A">Consent preferences per DID per channel</text>
  <text x="662" y="252" text-anchor="middle" font-size="10" fill="#5A7A8A">Sub-500ms real-time lookup API</text>
  <text x="662" y="270" text-anchor="middle" font-size="10" fill="#5A7A8A">Distributed DNS-like architecture</text>
  <text x="662" y="292" text-anchor="middle" font-size="9" fill="#8AA0AC">Integrity verified via on-chain commitments</text>

  <!-- Horizontal arrows: on-chain to resolver -->
  <line x1="405" y1="135" x2="495" y2="180" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <line x1="405" y1="235" x2="495" y2="230" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <line x1="405" y1="335" x2="495" y2="270" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <line x1="405" y1="435" x2="495" y2="290" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- APPLICATIONS -->
  <rect x="495" y="400" width="155" height="65" rx="4" fill="#E8F0F4" stroke="#1B3A4B" stroke-width="1.5"/>
  <text x="572" y="427" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B3A4B">Calmido app</text>
  <text x="572" y="445" text-anchor="middle" font-size="9" fill="#5A7A8A">Reference implementation</text>

  <rect x="675" y="400" width="155" height="65" rx="4" fill="#E8F0F4" stroke="#5A7A8A" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="752" y="427" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B3A4B">Third-party apps</text>
  <text x="752" y="445" text-anchor="middle" font-size="9" fill="#5A7A8A">Open API access</text>

  <!-- Arrow resolver to applications -->
  <line x1="572" y1="340" x2="572" y2="400" stroke="#1B3A4B" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <line x1="700" y1="340" x2="752" y2="400" stroke="#5A7A8A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Trust anchors (resolvers) -->
  <rect x="495" y="495" width="335" height="42" rx="4" fill="#F4F7F9" stroke="#C8D6DC" stroke-width="1"/>
  <text x="662" y="521" text-anchor="middle" font-size="10" fill="#5A7A8A">Resolvers: telecom · email · messaging  |  Optional: KvK · regulators</text>

  <!-- Arrow trust anchors to verification layer -->
  <path d="M 495 516 L 440 516 Q 430 516 430 506 L 430 260 Q 430 250 420 245 L 405 237" stroke="#5A7A8A" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 2"/>
  <text x="445" y="420" font-size="9" fill="#8AA0AC" transform="rotate(-90, 445, 420)">issue + revoke credentials</text>

  <!-- End users feedback -->
  <rect x="70" y="500" width="335" height="42" rx="4" fill="#F4F7F9" stroke="#C8D6DC" stroke-width="1"/>
  <text x="237" y="525" text-anchor="middle" font-size="10" fill="#5A7A8A">End users: anonymous feedback on registered organisations via connected applications</text>

  <!-- Arrow end users to reputation -->
  <line x1="237" y1="500" x2="237" y2="475" stroke="#5A7A8A" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 2"/>

  <!-- Legend -->
  <rect x="70" y="620" width="16" height="10" rx="2" fill="#1B3A4B"/>
  <text x="92" y="629" font-size="10" fill="#5A7A8A">On-chain protocol layers</text>
  <rect x="270" y="620" width="16" height="10" rx="2" fill="#FFFFFF" stroke="#1B3A4B" stroke-width="1.5"/>
  <text x="292" y="629" font-size="10" fill="#5A7A8A">Off-chain infrastructure</text>
  <line x1="480" y1="625" x2="510" y2="625" stroke="#5A7A8A" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="516" y="629" font-size="10" fill="#5A7A8A">Data flow</text>
  <line x1="620" y1="625" x2="650" y2="625" stroke="#1B3A4B" stroke-width="1.5"/>
  <text x="656" y="629" font-size="10" fill="#5A7A8A">Synchronisation</text>
</svg>
