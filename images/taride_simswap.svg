<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1B3A4B" flood-opacity="0.1"/>
    </filter>
    <marker id="arrRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#8B3A3A"/>
    </marker>
  </defs>

  <rect width="900" height="580" fill="#FAFBFC"/>
  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B3A4B" letter-spacing="0.5">SIM swap: what the protocol can and cannot do</text>

  <!-- BEFORE: normal state -->
  <rect x="30" y="60" width="840" height="70" rx="4" fill="#E8F4E8" stroke="#4A8A4A" stroke-width="1"/>
  <text x="450" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#2A5A2A">Normal state: victim's device</text>
  <text x="200" y="112" text-anchor="middle" font-size="10" fill="#2A5A2A">Private key (secure enclave)</text>
  <text x="450" y="112" text-anchor="middle" font-size="10" fill="#2A5A2A">Active SIM (phone number)</text>
  <text x="700" y="112" text-anchor="middle" font-size="10" fill="#2A5A2A">Verification credential (on-chain)</text>

  <!-- ATTACK EVENT -->
  <rect x="300" y="150" width="300" height="36" rx="4" fill="#8B3A3A" filter="url(#shadow)"/>
  <text x="450" y="173" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">SIM swap attack occurs</text>
  <line x1="450" y1="130" x2="450" y2="150" stroke="#8B3A3A" stroke-width="1.5" marker-end="url(#arrRed)"/>

  <!-- WHAT DOES NOT CHANGE -->
  <rect x="30" y="206" width="840" height="50" rx="4" fill="#F4F7F9" stroke="#5A7A8A" stroke-width="1"/>
  <text x="60" y="227" font-size="11" font-weight="bold" fill="#5A7A8A">What does not change:</text>
  <text x="250" y="227" font-size="10" fill="#5A7A8A">DID (same)</text>
  <text x="385" y="227" font-size="10" fill="#5A7A8A">Instance (same)</text>
  <text x="540" y="227" font-size="10" fill="#5A7A8A">Attestation provider (same)</text>
  <text x="695" y="227" font-size="10" fill="#5A7A8A">Credential on-chain (same)</text>
  <text x="450" y="246" text-anchor="middle" font-size="9" fill="#8AA0AC" font-style="italic">The chain knows nothing about SIM cards. Without further action, the protocol detects nothing.</text>

  <!-- WHAT DOES CHANGE -->
  <rect x="30" y="275" width="400" height="65" rx="4" fill="#FFF0F0" stroke="#8B3A3A" stroke-width="1"/>
  <text x="230" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="#8B3A3A">Victim</text>
  <text x="230" y="315" text-anchor="middle" font-size="10" fill="#5A5A5A">Has: private key</text>
  <text x="230" y="330" text-anchor="middle" font-size="10" fill="#8B3A3A">Lost: SIM</text>

  <rect x="470" y="275" width="400" height="65" rx="4" fill="#FFF0F0" stroke="#8B3A3A" stroke-width="1"/>
  <text x="670" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="#8B3A3A">Attacker</text>
  <text x="670" y="315" text-anchor="middle" font-size="10" fill="#5A5A5A">Has: SIM (phone number)</text>
  <text x="670" y="330" text-anchor="middle" font-size="10" fill="#8B3A3A">Missing: private key</text>

  <!-- FUNDAMENTAL DEFENCE -->
  <rect x="30" y="360" width="840" height="55" rx="4" fill="#1B3A4B" filter="url(#shadow)"/>
  <text x="450" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Fundamental defence: the attacker cannot use the DID</text>
  <text x="450" y="402" text-anchor="middle" font-size="10" fill="#A8C4D0">Can make calls/SMS (outside protocol). Cannot present credentials, authenticate, or act as DID holder.</text>

  <!-- OPTIONAL DETECTION -->
  <text x="50" y="440" font-size="11" font-weight="bold" fill="#5A7A8A">Optional detection (requires telecom integration):</text>

  <rect x="30" y="453" width="405" height="70" rx="4" fill="#FFF8E1" stroke="#C8A415" stroke-width="1"/>
  <text x="232" y="475" text-anchor="middle" font-size="11" font-weight="bold" fill="#8A7212">Continuous validation</text>
  <text x="232" y="493" text-anchor="middle" font-size="9" fill="#8A7212">App detects SIM is gone, flags instance as</text>
  <text x="232" y="506" text-anchor="middle" font-size="9" fill="#8A7212">"verification degraded." Only if active + app running.</text>

  <rect x="465" y="453" width="405" height="70" rx="4" fill="#FFF8E1" stroke="#C8A415" stroke-width="1"/>
  <text x="667" y="475" text-anchor="middle" font-size="11" font-weight="bold" fill="#8A7212">Credential metadata (last_sim_swap)</text>
  <text x="667" y="493" text-anchor="middle" font-size="9" fill="#8A7212">Telecom updates attestation provider with SIM swap timestamp.</text>
  <text x="667" y="506" text-anchor="middle" font-size="9" fill="#8A7212">Only if telecom actively exposes this data.</text>

  <!-- Note -->
  <text x="450" y="555" text-anchor="middle" font-size="10" fill="#8AA0AC" font-style="italic">The protocol limits what an attacker can do after a swap. It does not claim to detect or prevent SIM swap fraud.</text>
</svg>
